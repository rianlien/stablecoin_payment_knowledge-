site_name: Stablecoin & Agentic Commerce Research
site_url: https://rianlien.github.io/stablecoin_payment_knowledge-/

theme:
  name: material
  custom_dir: overrides
  language: ja
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: ja
  - tags
  - roamlinks

nav:
  - ホーム: index.md
  - ニュース: 00_Inbox/index.md
  - Daily Brief: 01_Daily-Briefs/index.md
  - Weekly: 02_Weekly/index.md
  - トピック:
    - 03_Topics/index.md
    - x402 エコシステム: 03_Topics/x402-ecosystem.md
    - エージェント決済認可: 03_Topics/agent-payment-authorization.md
    - PSP・マーチャント対応: 03_Topics/psp-merchant-readiness.md
    - ステーブルコインペイアウト: 03_Topics/stablecoin-payouts-platforms.md
    - B2B クロスボーダー: 03_Topics/stablecoin-b2b-crossborder.md
    - トークン化預金: 03_Topics/tokenized-deposits.md
    - エージェントウォレット: 03_Topics/agent-wallets.md
    - CLARITY Act: 03_Topics/CLARITY-Act.md
    - GENIUS Act: 03_Topics/GENIUS-Act.md
  - プロトコル:
    - 04_Protocols/index.md
    - x402:
      - 04_Protocols/x402.md
      - x402 バッチ決済: 04_Protocols/x402/x402-batch-settlement.md
    - Machine Payments Protocol（MPP）: 04_Protocols/mpp-machine-payments-protocol.md
    - Agent Payments Protocol（AP2）: 04_Protocols/ap2-agent-payments-protocol.md
    - Visa Trusted Agent Protocol（TAP）: 04_Protocols/visa-tap-trusted-agent-protocol.md
    - Circle CPN: 04_Protocols/circle-cpn.md
    - UCP（Universal Cart）: 04_Protocols/ucp-universal-cart-protocol.md
  - MOC:
    - 05_MOCs/index.md
    - プロトコル全体像: 05_MOCs/MOC_Protocols.md
    - 規制動向: 05_MOCs/MOC_Regulation.md
    - ステーブルコイン決済: 05_MOCs/MOC_Stablecoin_Payments.md
    - 企業マップ: 05_MOCs/MOC_Companies.md
  - 企業:
    - 06_Entities/Companies/index.md
    - Circle: 06_Entities/Companies/Circle.md
    - Coinbase: 06_Entities/Companies/Coinbase.md
    - Stripe: 06_Entities/Companies/Stripe.md
    - Fireblocks: 06_Entities/Companies/Fireblocks.md
    - Mastercard: 06_Entities/Companies/Mastercard.md
    - Visa: 06_Entities/Companies/Visa.md
    - Google: 06_Entities/Companies/Google.md
    - Block / CashApp: 06_Entities/Companies/Block-CashApp.md
    - Western Union: 06_Entities/Companies/WesternUnion.md
    - AllUnity: 06_Entities/Companies/AllUnity.md
    - Robinhood: 06_Entities/Companies/Robinhood.md
    - Parallel: 06_Entities/Companies/Parallel.md
  - ネットワーク:
    - 06_Entities/Networks/index.md
    - Base: 06_Entities/Networks/Base.md
  - 組織:
    - 06_Entities/Organizations/index.md
    - x402 Foundation: "06_Entities/Organizations/x402 Foundation.md"

markdown_extensions:
  - meta
  - attr_list
  - md_in_html
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
