name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Merge — No Conflict"]
    types: [completed]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git log --since を使うため全履歴が必要
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material mkdocs-roamlinks-plugin mkdocs-awesome-pages-plugin
      - name: Resolve symlinks into docs/
        run: |
          for d in 00_Inbox 01_Daily-Briefs 02_Weekly 03_Topics 04_Protocols 05_MOCs 06_Entities; do
            rm -f docs/$d
            cp -r $d docs/
          done
      - name: Generate listing index pages
        run: |
          python3 - <<'PYEOF'
          import os, glob, re
          from pathlib import Path
          from collections import defaultdict

          def get_title(filepath):
              try:
                  with open(filepath, encoding='utf-8') as f:
                      content = f.read()
                  m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
                  if m:
                      for line in m.group(1).split('\n'):
                          if line.startswith('title:'):
                              return line.split(':', 1)[1].strip().strip('"\'')
              except Exception:
                  pass
              return Path(filepath).stem

          # --- ニュース一覧 ---
          inbox_files = sorted(glob.glob('docs/00_Inbox/*.md'), reverse=True)
          by_month = defaultdict(list)
          for f in inbox_files:
              fname = Path(f).name
              m = re.match(r'^(\d{4})-(\d{2})-\d{2}', fname)
              if not m:
                  continue
              month = f'{m.group(1)}-{m.group(2)}'
              date = fname[:10]
              title = get_title(f)
              by_month[month].append((date, title, fname))

          lines = ['---', 'title: ニュース一覧', 'hide:', '  - toc', '---', '', '# ニュース一覧', '']
          for month in sorted(by_month.keys(), reverse=True):
              lines.append(f'## {month}')
              lines.append('')
              for date, title, fname in sorted(by_month[month], key=lambda x: x[0], reverse=True):
                  lines.append(f'- [{title}]({fname}) <small>{date}</small>')
              lines.append('')

          with open('docs/00_Inbox/index.md', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines))

          # --- Daily Brief 一覧 ---
          brief_files = sorted(glob.glob('docs/01_Daily-Briefs/**/*.md', recursive=True))
          by_month2 = defaultdict(list)
          for f in brief_files:
              fname = Path(f).name
              parent = Path(f).parent.name
              m = re.match(r'^(\d{4}-\d{2}-\d{2})\.md$', fname)
              if not m:
                  continue
              date = m.group(1)
              month = date[:7]
              by_month2[month].append((date, f'{parent}/{fname}'))

          lines2 = ['---', 'title: Daily Brief', 'hide:', '  - toc', '---', '', '# Daily Brief', '']
          for month in sorted(by_month2.keys(), reverse=True):
              lines2.append(f'## {month}')
              lines2.append('')
              for date, rel in sorted(by_month2[month], key=lambda x: x[0], reverse=True):
                  lines2.append(f'- [{date}]({rel})')
              lines2.append('')

          with open('docs/01_Daily-Briefs/index.md', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines2))

          print('Generated: 00_Inbox/index.md, 01_Daily-Briefs/index.md')
          PYEOF
      - run: mkdocs build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

      - name: Post Daily Brief URL to Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SKIP_MTIME_CHECK: "1"
          SITE_URL: https://rianlien.github.io/stablecoin_payment_knowledge-/
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          YEAR_MONTH=$(TZ=Asia/Tokyo date +%Y-%m)
          BRIEF_FILE="01_Daily-Briefs/${YEAR_MONTH}/${TODAY}.md"
          # 今日コミットされたブリーフのみ投稿（重複ガード）
          COMMITTED=$(git log --since="${TODAY}T00:00:00+09:00" --pretty="%H" -- "$BRIEF_FILE" 2>/dev/null | head -1)
          if [ -n "$COMMITTED" ] && [ -f "$BRIEF_FILE" ]; then
            echo "Posting Daily Brief for $TODAY"
            BRIEF_DATE="$TODAY" python3 .claude/hooks/post_brief_to_slack.py
          else
            echo "No new Daily Brief today — skipping"
          fi

      - name: Post Weekly Digest URL to Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SITE_URL: https://rianlien.github.io/stablecoin_payment_knowledge-/
        run: |
          # 直近 7 日以内にコミットされた Weekly Digest ファイルを検出
          WEEKLY_FILE=$(git log --since="7 days ago" --name-only --format="" \
            -- '02_Weekly/*.md' 2>/dev/null | grep '02_Weekly/' | head -1)
          if [ -n "$WEEKLY_FILE" ] && [ -f "$WEEKLY_FILE" ]; then
            echo "Posting Weekly Digest: $WEEKLY_FILE"
            WEEKLY_FILE="$WEEKLY_FILE" python3 .claude/hooks/post_weekly_to_slack.py
          else
            echo "No recent Weekly Digest — skipping"
          fi
