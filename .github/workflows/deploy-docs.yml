name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Merge — No Conflict"]
    types: [completed]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material mkdocs-roamlinks-plugin mkdocs-awesome-pages-plugin
      - name: Resolve symlinks into docs/
        run: |
          for d in 00_Inbox 01_Daily-Briefs 02_Weekly 03_Topics 04_Protocols 05_MOCs 06_Entities; do
            rm -f docs/$d
            cp -r $d docs/
          done
      - run: mkdocs build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
