name: Auto Merge — No Conflict

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Check mergeable and merge
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          for i in 1 2 3 4 5 6; do
            STATUS=$(gh api repos/$REPO/pulls/$PR --jq '.mergeable')
            echo "attempt $i: mergeable=$STATUS"
            if [ "$STATUS" = "true" ]; then
              echo "No conflicts — merging PR #$PR"
              gh pr merge $PR --repo $REPO --merge
              echo "merged=true" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "false" ]; then
              echo "Conflicts detected — skipping auto merge"
              exit 0
            fi
            sleep 10
          done

          echo "Could not determine mergeable status after retries — skipping"

      - name: Trigger Slack post if daily brief was added
        if: steps.merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          BRIEF_FILE=$(gh api repos/$REPO/pulls/$PR/files --jq '.[].filename' \
            | grep '^01_Daily-Briefs/.*\.md$' | head -1 || true)
          if [ -n "$BRIEF_FILE" ]; then
            DATE=$(basename "$BRIEF_FILE" .md)
            echo "Daily brief found: $BRIEF_FILE — dispatching post-to-slack (date=$DATE)"
            gh workflow run post-to-slack.yml --repo $REPO --field brief_date=$DATE
          else
            echo "No daily brief in this PR — skipping Slack dispatch"
          fi
