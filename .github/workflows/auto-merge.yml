name: Auto Merge — No Conflict

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check mergeable and merge
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          MERGED=false

          for i in 1 2 3 4 5 6; do
            STATUS=$(gh api repos/$REPO/pulls/$PR --jq '.mergeable')
            echo "attempt $i: mergeable=$STATUS"
            if [ "$STATUS" = "true" ]; then
              echo "No conflicts — merging PR #$PR"
              gh pr merge $PR --repo $REPO --merge
              MERGED=true
              break
            elif [ "$STATUS" = "false" ]; then
              echo "Conflicts detected — skipping auto merge"
              break
            fi
            sleep 10
          done

          echo "merged=$MERGED" >> $GITHUB_OUTPUT
          [ "$MERGED" = "false" ] && echo "Could not merge or had conflicts"

      - name: Trigger MkDocs deploy
        if: steps.merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-docs.yml --repo ${{ github.repository }} --ref main
