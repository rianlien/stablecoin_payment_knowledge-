name: Post Weekly Digest to Slack

on:
  push:
    branches: [main]
    paths:
      - '02_Weekly/**/*.md'
  workflow_dispatch:
    inputs:
      weekly_file:
        description: 'Repo-relative path to weekly digest (e.g. 02_Weekly/2026-W25.md)'
        required: true
        type: string

jobs:
  post-to-slack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed weekly digest
        id: weekly
        run: |
          # Manual dispatch: use provided input
          if [ -n "${{ inputs.weekly_file }}" ]; then
            WEEKLY_FILE="${{ inputs.weekly_file }}"
          else
            WEEKLY_FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD 2>/dev/null \
              | grep '^02_Weekly/.*\.md$' | head -1 || true)
            if [ -z "$WEEKLY_FILE" ]; then
              WEEKLY_FILE=$(git show --name-only --format= HEAD \
                | grep '^02_Weekly/.*\.md$' | head -1 || true)
            fi
          fi
          if [ -n "$WEEKLY_FILE" ]; then
            WEEK=$(basename "$WEEKLY_FILE" .md)
            echo "week=$WEEK" >> "$GITHUB_OUTPUT"
            echo "file=$WEEKLY_FILE" >> "$GITHUB_OUTPUT"
            echo "Found weekly: $WEEKLY_FILE (week=$WEEK)"
          else
            echo "No weekly digest found"
          fi

      - name: Post to Slack
        if: steps.weekly.outputs.week != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WEEKLY_FILE: ${{ steps.weekly.outputs.file }}
        run: python3 .claude/hooks/post_weekly_to_slack.py
